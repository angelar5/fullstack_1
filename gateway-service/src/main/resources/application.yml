server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/users/**
        - id: auth-service
          uri: http://localhost:8082
          predicates:
            - Path=/auth/**
        - id: inventory-service
          uri: http://localhost:8083
          predicates:
            - Path=/inventory/**
        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/orders/**
        - id: store-service
          uri: http://localhost:8085
          predicates:
            - Path=/stores/**
        - id: shipping-service
          uri: http://localhost:8086
          predicates:
            - Path=/shipping/**
        - id: supplier-service
          uri: http://localhost:8087
          predicates:
            - Path=/suppliers/**
        - id: billing-service
          uri: http://localhost:8088
          predicates:
            - Path=/billing/**
        - id: review-service
          uri: http://localhost:8089
          predicates:
            - Path=/reviews/**
        - id: coupon-service
          uri: http://localhost:8090
          predicates:
            - Path=/coupons/**

