spring.application.name=review-service
server.port=8089

# H2 Database Config (Disabled)
# spring.datasource.url=jdbc:h2:mem:reviewdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# MySQL / XAMPP Configuration (Active)
spring.datasource.url=jdbc:mysql://localhost:3306/ecomarket_review?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.flyway.clean-disabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Service integration configs
app.inventory-service.url=http://localhost:8093
app.coupon-service.url=http://localhost:8090
app.billing-service.url=http://localhost:8088

# Structured logging
logging.level.root=INFO
logging.level.com.ecomarket.reviewservice=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n